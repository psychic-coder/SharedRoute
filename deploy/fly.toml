app = "shardroute-app"
primary_region = "iad"

[build]
  dockerfile = "deploy/Dockerfile"

[env]
  SHARDBROUTE_HTTP_PORT = "8080"
  SHARDBROUTE_GRPC_PORT = "9090"
  # Set SHARDBROUTE_REDIS_ADDRS via fly secrets

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  timeout = "2s"
  method = "GET"
  path = "/healthz"

[[http_service.checks]]
  grace_period = "15s"
  interval = "15s"
  timeout = "2s"
  method = "GET"
  path = "/readyz"
