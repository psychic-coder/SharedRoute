version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# Shared Redis instance used by both comparison services.
# ─────────────────────────────────────────────────────────────────────────────
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── DIRECT (no local cache) ────────────────────────────────────────────────
  # cache_mode=direct: every /v1/check call executes the Lua EVALSHA round-trip.
  # This is the baseline — measures raw Redis network + serialization latency.
  shardroute-direct:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      - SHARDBROUTE_HTTP_PORT=8080
      - SHARDBROUTE_GRPC_PORT=9090
      - SHARDBROUTE_REDIS_ADDRS=redis:6379
      - SHARDBROUTE_LIMITER_CACHE_MODE=direct
      - SHARDBROUTE_FAILURE_MODE=fail_open
    ports:
      - "8081:8080"
      - "9091:9090"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    depends_on:
      redis:
        condition: service_healthy

  # ── LOCAL CACHE (optimized) ────────────────────────────────────────────────
  # cache_mode=local_cache: requests are served from the in-process
  # ApproximateCounter when tokens are available; Redis is only hit on cache
  # miss or at sync_interval_ms tick. This is the optimized comparison target.
  shardroute-cached:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      - SHARDBROUTE_HTTP_PORT=8080
      - SHARDBROUTE_GRPC_PORT=9090
      - SHARDBROUTE_REDIS_ADDRS=redis:6379
      - SHARDBROUTE_LIMITER_CACHE_MODE=local_cache
      - SHARDBROUTE_LIMITER_SYNC_INTERVAL_MS=100
      - SHARDBROUTE_FAILURE_MODE=fail_open
    ports:
      - "8082:8080"
      - "9092:9090"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    depends_on:
      redis:
        condition: service_healthy

  # ── LEGACY MULTI-INSTANCE (kept for chaos / multi-node tests) ─────────────
  shardroute-1:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    profiles: ["multi"]
    environment:
      - SHARDBROUTE_HTTP_PORT=8080
      - SHARDBROUTE_GRPC_PORT=9090
      - SHARDBROUTE_REDIS_ADDRS=redis:6379
    ports:
      - "8083:8080"
      - "9093:9090"
    depends_on:
      redis:
        condition: service_healthy

  shardroute-2:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    profiles: ["multi"]
    environment:
      - SHARDBROUTE_HTTP_PORT=8080
      - SHARDBROUTE_GRPC_PORT=9090
      - SHARDBROUTE_REDIS_ADDRS=redis:6379
    ports:
      - "8084:8080"
      - "9094:9090"
    depends_on:
      redis:
        condition: service_healthy
