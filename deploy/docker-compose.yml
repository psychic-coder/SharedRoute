version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  shardroute-1:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      - SHARDBROUTE_HTTP_PORT=8081
      - SHARDBROUTE_GRPC_PORT=9091
      - SHARDBROUTE_REDIS_ADDRS=redis:6379
    ports:
      - "8081:8081"
      - "9091:9091"
    depends_on:
      redis:
        condition: service_healthy

  shardroute-2:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      - SHARDBROUTE_HTTP_PORT=8082
      - SHARDBROUTE_GRPC_PORT=9092
      - SHARDBROUTE_REDIS_ADDRS=redis:6379
    ports:
      - "8082:8082"
      - "9092:9092"
    depends_on:
      redis:
        condition: service_healthy

  shardroute-3:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      - SHARDBROUTE_HTTP_PORT=8083
      - SHARDBROUTE_GRPC_PORT=9093
      - SHARDBROUTE_REDIS_ADDRS=redis:6379
    ports:
      - "8083:8083"
      - "9093:9093"
    depends_on:
      redis:
        condition: service_healthy
